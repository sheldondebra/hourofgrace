<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Hour of Grace Family Chapel International</title>
  <meta name="description" content="Photos from worship services, outreach events, and community gatherings at Hour of Grace Ministries International." />
  <link rel="canonical" href="https://hourofgraceministries.org/gallery/" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#3F3D8B" />
  <link rel="icon" href="/assets/logo.png" type="image/png" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_GB" />
  <meta property="og:site_name" content="Hour of Grace Family Chapel International" />
  <meta property="og:title" content="Gallery — Hour of Grace Family Chapel International" />
  <meta property="og:description" content="Photos from worship, outreach, and community gatherings at Hour of Grace Ministries International." />
  <meta property="og:url" content="https://hourofgraceministries.org/gallery/" />
  <meta property="og:image" content="https://hourofgraceministries.org/assets/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;0,900;1,500;1,600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { purple: '#3F3D8B', 'purple-dark': '#2E2C6A', sky: '#87CEEB', cream: '#FAFAF8' },
          },
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/css/custom.css" />
</head>
<body class="font-sans text-slate-800 bg-brand-cream antialiased">

  <div id="site-header"></div>

  <main class="pt-[72px]">
    <section class="py-16 lg:py-20 bg-white border-b border-slate-100">
      <div class="max-w-6xl mx-auto px-5 lg:px-8">
        <p class="section-label text-brand-purple text-xs uppercase font-medium mb-4">Community Life</p>
        <h1 class="font-serif text-4xl md:text-5xl text-slate-900 max-w-2xl leading-tight">Our Gallery</h1>
        <p class="text-slate-600 mt-5 max-w-xl text-[15px] leading-relaxed">
          Moments from worship, outreach, conferences, and fellowship at Hour of Grace Family Chapel International.
        </p>
      </div>
    </section>

    <section class="py-16 lg:py-20">
      <div class="max-w-6xl mx-auto px-5 lg:px-8">
        <div id="gallery-full" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>
    </section>
  </main>

  <div id="lightbox" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4" role="dialog" aria-modal="true">
    <button id="lightbox-close" type="button" class="absolute top-5 right-5 text-white/80 hover:text-white p-2" aria-label="Close">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <button id="lightbox-prev" type="button" class="absolute left-4 md:left-8 text-white/80 hover:text-white p-2" aria-label="Previous">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <img id="lightbox-img" src="" alt="Gallery photo" class="max-h-[85vh] max-w-full rounded-lg object-contain" />
    <button id="lightbox-next" type="button" class="absolute right-4 md:right-8 text-white/80 hover:text-white p-2" aria-label="Next">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <div id="site-footer"></div>
  <script src="/js/main.js"></script>
</body>
</html>
